name: zero_wallet
description: "ZeroChain Wallet - A secure wallet for ZeroChain blockchain"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  provider: ^6.1.1
  riverpod: ^2.4.9
  flutter_riverpod: ^2.4.9

  cryptography: ^2.6.1
  pointycastle: ^3.7.4
  convert: ^3.1.1
  bip39: ^1.0.6
  wallet: ^0.0.13

  dio: ^5.4.0
  http: ^1.2.2
  web3dart: ^2.7.3

  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  equatable: ^2.0.5
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  logger: ^2.0.2+1
  intl: ^0.19.0

  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0

  qr_flutter: ^4.1.0
  image_gallery_saver_plus: ^4.0.1
  permission_handler: ^11.4.0
  mobile_scanner: ^3.5.5

  local_auth: ^2.1.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  freezed: ^2.4.6
  hive_generator: ^2.0.1
  mockito: ^5.4.4
  mocktail: ^1.0.2

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/icons/app_icon.png
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
